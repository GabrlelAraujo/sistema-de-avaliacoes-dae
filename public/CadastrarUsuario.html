<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Atendente</title>

    <link rel="stylesheet" href="css/cadastrar.css">
</head>

<body>

<header class="header">

    <div class="header-left">

        <img src="img/logo_dae.png" class="logo">

        <div>
            <h1>Cadastro de Atendentes</h1>
            <p>Gerenciamento de usuários</p>
        </div>

    </div>

    <button id="backBtn" class="header-btn">
        Voltar
    </button>

</header>

<main class="container">

    <section class="card">

        <h2>Novo Atendente</h2>

        <div class="form-group">

            <label>Nome</label>

            <input
                type="text"
                id="name"
                placeholder="Digite o nome">

        </div>

        <div class="form-group">

            <label>Usuário</label>

            <input
                type="text"
                id="username"
                placeholder="Digite o usuário">

        </div>

        <div class="form-group">

            <label>Senha</label>

            <input
                type="password"
                id="password"
                placeholder="Digite a senha">

        </div>

        <button id="saveBtn" class="save-btn">
            Cadastrar
        </button>

    </section>

    <section class="table-card">

        <h2>Atendentes Cadastrados</h2>

        <table>

            <thead>

                <tr>

                    <th>Nome</th>
                    <th>Usuário</th>
                    <th>Ações</th>

                </tr>

            </thead>
                
            <tbody id="usersBody">

            </tbody>

        </table>

        <div
            class="empty"
            id="emptyUsers"
            style="display:none;"
        >
            Nenhum atendente cadastrado.
        </div>

    </section>

</main>

<script src="js/CadasUsuario.js"></script>

</body>
</html>
