<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Avaliação de Atendimento</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="screen wide">
    <div class="card">
      <div class="top-bar">
        <div>
          <h1 style="margin:0;font-size:20px;">Painel do Administrador</h1>
          <p style="margin:4px 0 0;color:var(--text-muted);font-size:13px;">Resultados das avaliações</p>
        </div>
        <div class="footer-actions" style="margin:0;">
          <button class="btn btn-secondary btn-small" id="backBtn">Voltar</button>
          <button class="btn btn-secondary btn-small" id="logoutBtn">Sair</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="summary">Resumo por Atendente</button>
        <button class="tab-btn" data-tab="all">Todas as Avaliações</button>
      </div>

      <div class="tab-content active" id="tab-summary">
        <table>
          <thead>
            <tr>
              <th>Atendente</th>
              <th>Total</th>
              <th>Pergunta 1</th>
              <th>Pergunta 2</th>
              <th>Média Geral</th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
        <div class="empty-state" id="summaryEmpty" style="display:none;">Nenhum dado ainda.</div>
      </div>

      <div class="tab-content" id="tab-all">
        <table>
          <thead>
            <tr>
              <th>Atendente</th>
              <th>Pergunta 1</th>
              <th>Pergunta 2</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="allBody"></tbody>
        </table>
        <div class="empty-state" id="allEmpty" style="display:none;">Nenhuma avaliação registrada ainda.</div>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
