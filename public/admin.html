<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo</title>

    
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<header class="header">

    <div class="header-left">

        <img src="img/logo_dae.png" alt="DAE" class="logo">

        <div>
            <h1>Painel Administrativo</h1>
            <p>Resultados das avaliações</p>
        </div>

    </div>

    <div class="header-right">

        <button id="backBtn" class="header-btn">
            Voltar
        </button>

        <button id="logoutBtn" class="header-btn danger">
            Sair
        </button>

    </div>

</header>

<main class="container">

    <div class="toolbar">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Pesquisar atendente..."
            >

        </div>

    </div>

    <section class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Atendente</th>
                    <th>Avaliações</th>
                    <th>Pergunta 1</th>
                    <th>Pergunta 2</th>
                    <th>Média Geral</th>
                    <th></th>

                </tr>

            </thead>

            <tbody id="summaryBody"></tbody>

        </table>

        <div
            class="empty-state"
            id="summaryEmpty"
            style="display:none;"
        >
            Nenhum atendente encontrado.
        </div>

    </section>

</main>

<script src="js/admin.js"></script>

</body>
</html>
